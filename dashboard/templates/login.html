<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            background: #0d1117;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .box {
            background: #161b22;
            padding: 40px 30px;
            border-radius: 15px;
            width: 320px;
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.3);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #58a6ff;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0;
            background: #1c2230;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #58a6ff;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        button:hover {
            background: #1f6feb;
            transform: scale(1.03);
        }

        p {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        a {
            color: #58a6ff;
            text-decoration: none;
            font-weight: 500;
        }

        a:hover {
            text-decoration: underline;
        }

        .error {
            color: #ff6b6b;
            text-align: center;
            margin-bottom: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Login</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <p>Don't have an account? <a href="/register/">Register</a></p>
</div>

</body>
</html>
